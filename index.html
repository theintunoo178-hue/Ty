<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Game - 3D Snooker AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>ဘော GAME (3D Snooker)</h1>
        <div class="table-3d-wrapper">
            <canvas id="snookerCanvas"></canvas>
        </div>
        <div class="controls">
            <button id="resetBtn">RESET GAME</button>
            <p id="status">သင့်အလှည့်: ဘောလုံးကို ချိန်ပြီး ရိုက်ပါ</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
